<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Rekap Nama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #10b981; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .cyber-border { border-left: 4px solid var(--accent); }
    </style>
</head>
<body class="p-4 pb-20 text-slate-800">

    <div class="bg-slate-900 text-white p-5 rounded-xl shadow-lg mb-6 text-center border-b-4 border-emerald-500 relative">
        <h1 class="text-xl font-black tracking-wider uppercase text-emerald-400">REKAP NAMA</h1>
        <p class="text-xs text-slate-400 mt-1">INPUT MANUAL & PASTE BANYAK</p>
    </div>

    <div id="area-manual" class="bg-white p-5 rounded-xl shadow-md mb-6 cyber-border">
        <h3 class="font-bold text-slate-700 mb-3 text-sm">TAMBAH NAMA SATUAN</h3>
        <input type="text" id="input-nama" placeholder="Masukkan Nama Lengkap" class="w-full mb-3 p-3 border border-slate-300 rounded-lg outline-none focus:border-emerald-500">
        <button onclick="tambahManual()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 transition">
            ➕ TAMBAHKAN SATUAN
        </button>

        <hr class="my-5 border-slate-200">

        <h3 class="font-bold text-slate-700 mb-3 text-sm">PASTE BANYAK NAMA (Dari WA/Catatan)</h3>
        <textarea id="input-banyak-nama" rows="4" placeholder="Paste daftar nama di sini...&#10;Contoh:&#10;Budi&#10;Andi&#10;Siti" class="w-full mb-3 p-3 border border-slate-300 rounded-lg outline-none focus:border-blue-500 text-sm"></textarea>
        <button onclick="prosesBanyakNama()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
            📋 PROSES SEMUA NAMA SEKALIGUS
        </button>
    </div>

    <div class="bg-white p-5 rounded-xl shadow-md mb-6 cyber-border border-l-blue-500">
        <h3 class="font-bold text-slate-700 mb-2 text-sm">INFO PENGIRIM / ACARA</h3>
        <p class="text-xs text-slate-400 mb-3">Teks ini akan tercetak otomatis di file PDF & Excel.</p>
        <input type="text" id="input-pengirim" onchange="simpanPengirim(this.value)" placeholder="Contoh: Bendahara RT 01 / Ikram Cyber" class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:border-blue-500 text-sm font-bold text-slate-700">
    </div>

    <div class="grid grid-cols-3 gap-2 mb-6">
        <button onclick="exportPDF()" class="bg-red-500 text-white py-2 rounded-lg font-bold text-xs hover:bg-red-600 shadow"><i class="fas fa-file-pdf"></i> 📄 PDF</button>
        <button onclick="exportExcel()" class="bg-green-600 text-white py-2 rounded-lg font-bold text-xs hover:bg-green-700 shadow"><i class="fas fa-file-excel"></i> 📊 EXCEL</button>
        <button onclick="generateShareLink()" class="bg-blue-500 text-white py-2 rounded-lg font-bold text-xs hover:bg-blue-600 shadow"><i class="fas fa-share-alt"></i> 🔗 SHARE</button>
    </div>

    <div class="bg-white p-5 rounded-xl shadow-md">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h3 class="font-bold text-slate-800">📋 DAFTAR REKAP</h3>
            <button onclick="resetData()" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold">RESET</button>
        </div>
        
        <p class="text-xs text-slate-400 mb-3 italic">*Klik nama untuk langsung mengedit</p>
        
        <div id="data-list" class="space-y-3 mb-6">
            </div>
    </div>

    <script>
        let db_rekap = [];

        // LOAD DATA AWAL
        window.onload = function() {
            document.getElementById('input-pengirim').value = localStorage.getItem('cyber_scan_pengirim') || "";

            const urlParams = new URLSearchParams(window.location.search);
            const sharedData = urlParams.get('data');
            
            if (sharedData) {
                try {
                    const decodedData = JSON.parse(decodeURIComponent(atob(sharedData)));
                    db_rekap = decodedData;
                    alert("Berhasil memuat data dari link yang dibagikan!");
                    window.history.replaceState({}, document.title, window.location.pathname);
                } catch (e) {
                    alert("Link data tidak valid atau rusak.");
                    db_rekap = JSON.parse(localStorage.getItem('cyber_scan_data')) || [];
                }
            } else {
                db_rekap = JSON.parse(localStorage.getItem('cyber_scan_data')) || [];
            }
            render();
        };

        function simpanPengirim(val) {
            localStorage.setItem('cyber_scan_pengirim', val);
        }

        function tambahManual() {
            let nama = document.getElementById('input-nama').value;
            if(!nama) return alert("Nama tidak boleh kosong!");

            db_rekap.push({ id: Date.now(), nama: nama });
            saveData();
            document.getElementById('input-nama').value = "";
        }

        function prosesBanyakNama() {
            let teksArea = document.getElementById('input-banyak-nama').value;
            if(!teksArea.trim()) return alert("Kotak teks masih kosong, paste dulu namanya!");

            let barisanNama = teksArea.split('\n');
            let jumlahDitambahkan = 0;

            barisanNama.forEach(nama => {
                let namaBersih = nama.trim();
                if(namaBersih !== "") {
                    db_rekap.push({ id: Date.now() + Math.random(), nama: namaBersih });
                    jumlahDitambahkan++;
                }
            });

            saveData();
            document.getElementById('input-banyak-nama').value = "";
            alert(`Mantap! ${jumlahDitambahkan} nama berhasil ditambahkan.`);
        }

        function updateNama(id, value) {
            let index = db_rekap.findIndex(x => x.id == id);
            if(index > -1) {
                db_rekap[index].nama = value;
                localStorage.setItem('cyber_scan_data', JSON.stringify(db_rekap));
            }
        }

        function hapusData(id) {
            db_rekap = db_rekap.filter(x => x.id != id);
            saveData();
        }

        function resetData() {
            if(confirm("Hapus semua data rekap?")) {
                db_rekap = [];
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('cyber_scan_data', JSON.stringify(db_rekap));
            render();
        }

        function exportPDF() {
            if(db_rekap.length === 0) return alert("Data masih kosong!");
            
            let pengirim = document.getElementById('input-pengirim').value || "Tanpa Keterangan";
            let tgl = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(16);
            doc.text("LAPORAN REKAP NAMA", 14, 20);
            doc.setFontSize(11);
            doc.text("Acara : " + pengirim, 14, 28);
            doc.text("Tanggal Cetak : " + tgl, 14, 34);
            
            const tableData = db_rekap.map((item, index) => {
                return [index + 1, item.nama];
            });

            doc.autoTable({
                head: [['No', 'Nama']],
                body: tableData,
                startY: 40,
                theme: 'grid',
                headStyles: { fillColor: [16, 185, 129] }
            });

            doc.save(`Rekap_Nama_${new Date().toISOString().slice(0,10)}.pdf`);
        }

        function exportExcel() {
            if(db_rekap.length === 0) return alert("Data masih kosong!");
            
            let pengirim = document.getElementById('input-pengirim').value || "Tanpa Keterangan";
            let tgl = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            let ws_data = [
                ["LAPORAN REKAP NAMA"],
                ["Acara", pengirim],
                ["Tanggal Cetak", tgl],
                [], 
                ["No", "Nama"]
            ];
            
            db_rekap.forEach((item, index) => {
                ws_data.push([index + 1, item.nama]);
            });

            let ws = XLSX.utils.aoa_to_sheet(ws_data);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap Data");
            
            XLSX.writeFile(wb, `Rekap_Nama_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        function generateShareLink() {
            if(db_rekap.length === 0) return alert("Data masih kosong!");
            
            const jsonStr = JSON.stringify(db_rekap);
            const encodedData = btoa(encodeURIComponent(jsonStr));
            
            const url = window.location.origin + window.location.pathname + "?data=" + encodedData;
            
            navigator.clipboard.writeText(url).then(() => {
                alert("Link berhasil di-copy!\n\nSilakan paste di WhatsApp buat nge-share daftar ini.");
            }).catch(err => {
                prompt("Copy link di bawah ini secara manual:", url);
            });
        }

        function render() {
            let listHTML = "";
            db_rekap.forEach(item => {
                listHTML += `
                <div class="flex items-center justify-between bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <div class="flex-1 pr-3">
                        <input type="text" onchange="updateNama(${item.id}, this.value)" value="${item.nama}" class="font-bold text-slate-800 text-sm w-full bg-transparent border-b border-dashed border-slate-300 outline-none focus:border-emerald-500 pb-1">
                    </div>
                    <button onclick="hapusData(${item.id})" class="text-slate-400 bg-slate-200 w-8 h-8 rounded-full flex justify-center items-center hover:bg-red-500 hover:text-white transition" title="Hapus Data">✖</button>
                </div>
                `;
            });
            document.getElementById('data-list').innerHTML = listHTML;
        }
    </script>
</body>
</html>
